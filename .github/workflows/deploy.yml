# .github/workflows/deploy.yml
# Build + déploiement matchs-360 vers OVH mutualisé (matchs360.fr) via SFTP/lftp.
# OVH ne supporte pas le FTPS ; lftp en SFTP envoie le CONTENU de dist (dotfiles
# inclus, ex .htaccess) dans /home/matchsu/www et nettoie les fichiers obsolètes.
#
# Secrets requis : FTP_SERVER (ftp.cluster129.hosting.ovh.net), FTP_USERNAME (matchsu),
# FTP_PASSWORD (mot de passe du compte matchsu).

name: Build & Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ovh
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances
        run: npm install --no-audit --no-fund

      - name: Contrôle de types (bloquant)
        run: npm run typecheck

      - name: Lint (informatif)
        run: npm run lint
        continue-on-error: true

      - name: Build de production
        run: npm run build

      # Déploiement SFTP via lftp : mirror -R = upload du CONTENU de ./dist/
      # (dotfiles inclus), --delete = supprime les fichiers distants obsolètes
      # (nettoie aussi l'ancien sous-dossier www/dist/ des essais précédents).
      - name: Déploiement SFTP vers OVH
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "sftp://$FTP_SERVER" \
            -e "set sftp:auto-confirm yes; mirror -R --delete --verbose ./dist/ www/; bye"