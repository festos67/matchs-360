# .github/workflows/deploy.yml
# -----------------------------------------------------------------------------
# Déploiement automatique de matchs-360 vers l'hébergement mutualisé OVH.
# À chaque push sur la branche `main`, le site est rebuildé (Vite) puis envoyé
# par FTPS dans le dossier web de matchs360.fr.
#
# PRÉREQUIS (à configurer une seule fois dans GitHub) :
#   Settings > Secrets and variables > Actions > Secrets
#     - FTP_SERVER    : ex. ftp.cluster0XX.hosting.ovh.net  (voir mail OVH "Hébergement")
#     - FTP_USERNAME  : identifiant FTP OVH (ex. matchs360-xxx)
#     - FTP_PASSWORD  : mot de passe FTP OVH
#   (voir le GUIDE-MIGRATION-OVH.md pour savoir où trouver ces valeurs)
# -----------------------------------------------------------------------------

name: Build & Deploy to OVH

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # permet aussi un déploiement manuel depuis l'onglet Actions

# Évite que deux déploiements se chevauchent (un push pendant un déploiement
# annule le précédent).
concurrency:
  group: deploy-ovh
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # NB : on utilise `npm install` (et non `npm ci`) car le package-lock.json
      # du dépôt n'est pas synchronisé avec package.json (Lovable gère les
      # dépendances via bun). `npm install` résout proprement cet écart.
      - name: Installation des dépendances
        run: npm install --no-audit --no-fund

      # Le build lit automatiquement le fichier .env présent dans le dépôt
      # (clé `anon` publique Supabase — sans risque côté client).
      # Si un jour vous retirez .env du dépôt, définissez les deux variables
      # ci-dessous dans GitHub (Settings > Variables) et dé-commentez le bloc env.
      - name: Build de production
        run: npm run build
        # env:
        #   VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
        #   VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Déploiement FTPS vers OVH
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps           # FTP explicite sur TLS (supporté par OVH)
          port: 21
          local-dir: ./dist/       # contenu buildé par Vite
          # IMPORTANT : adaptez server-dir au dossier racine associé à
          # matchs360.fr dans OVH (Multisite). Par défaut sur un mutualisé le
          # site principal est servi depuis /www/. Le slash final est requis.
          server-dir: ./www/
          # Conserve un état de synchro pour n'envoyer que les fichiers modifiés
          # (déploiements incrémentaux plus rapides).
          dangerous-clean-slate: false
