# ============================================================
# Edge functions registry
# ============================================================
# Each [functions.X] block below MUST correspond to a directory
# supabase/functions/X/ with an index.ts file.
#
# verify_jwt = false is reserved for endpoints that intentionally
# accept anonymous requests AND implement their own auth check
# inside the function (e.g. webhook signature verification, public
# invitation acceptance flow). Never declare verify_jwt = false
# without a corresponding code review and a justification comment
# immediately above the block.
#
# To add a new function:
#   supabase functions new <name>
#   # then add the [functions.<name>] block here
#
# To remove a function:
#   supabase functions delete <name>   # remove from remote first
#   rm -rf supabase/functions/<name>
#   # then remove the [functions.<name>] block here
# ============================================================

[functions.admin-users]
verify_jwt = false

[functions.send-invitation]
verify_jwt = false

[functions.import-framework]
verify_jwt = false

# Cron-triggered (pg_cron). Auth applicative en code : comparaison temps-constant
# du header Authorization contre le secret partage `cron_auth_secret` (Vault, lu
# via la RPC get_cron_secret). verify_jwt = false car le secret n'est pas un JWT.
[functions.send-invitation-reminders]
verify_jwt = false

[functions.execute-erasure]
verify_jwt = false

[functions.dispatch-guardian-notifications]
verify_jwt = false

# SEC-AUTH-004 — endpoint d'aide à la connexion appelé depuis la page publique
# /auth (utilisateur anonyme, aucun JWT). verify_jwt = false est requis ; la
# fonction implémente son propre rate-limit + réponse générique anti-énumération.
[functions.request-login-help]
verify_jwt = false

# Notification "role ajoute" pour utilisateurs existants (assignation directe).
# verify_jwt = false : auth applicative en code (getUser + check admin/club_admin).
[functions.notify-role-added]
verify_jwt = false