<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy : limite l'exfiltration en cas de XSS et bloque
      le clickjacking via frame-ancestors. HSTS / X-Frame-Options réels sont
      servis côté hosting Lovable (Cloudflare). 'unsafe-inline' style requis
      par Tailwind/shadcn et le <style> runtime de Recharts (chart.tsx).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://aasihxqsasjpszqjlbid.supabase.co; font-src 'self' data:; connect-src 'self' https://aasihxqsasjpszqjlbid.supabase.co wss://aasihxqsasjpszqjlbid.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
