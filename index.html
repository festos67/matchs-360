<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy : limite l'exfiltration en cas de XSS et bloque
      le clickjacking via frame-ancestors. HSTS / X-Frame-Options réels sont
      servis côté hosting Lovable (Cloudflare). 'unsafe-inline' style requis
      par Tailwind/shadcn et le <style> runtime de Recharts (chart.tsx).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://aasihxqsasjpszqjlbid.supabase.co; font-src 'self' data:; connect-src 'self' https://aasihxqsasjpszqjlbid.supabase.co wss://aasihxqsasjpszqjlbid.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>MATCHS360</title>
    <meta name="description" content="Plateforme de gestion pour clubs sportifs : équipes, joueurs, débriefs d'évaluation, supporters et référentiels de compétences." />
    <meta name="theme-color" content="#3B82F6" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MATCHS360" />
    <meta property="og:description" content="Plateforme de gestion pour clubs sportifs : équipes, joueurs, débriefs d'évaluation, supporters et référentiels de compétences." />
    <meta property="og:locale" content="fr_FR" />
    <!-- og:url et og:image à compléter quand domaine de prod et asset social (1200x630) seront finalisés. -->

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MATCHS360" />
    <meta name="twitter:description" content="Plateforme de gestion pour clubs sportifs : équipes, joueurs, débriefs d'évaluation, supporters et référentiels de compétences." />
    <!-- twitter:image à aligner sur og:image quand l'asset social sera disponible. -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
